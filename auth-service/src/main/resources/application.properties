spring.application.name=auth-service
server.port=8001

# -----------------------------------------------------
# CONFIGURACIÓN PARA SUPABASE (POSTGRESQL)
# -----------------------------------------------------

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------
# JPA & HIBERNATE (Reglas de las tablas)
# -----------------------------------------------------


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Especificamos el esquema 'usuarios' para organizar nuestras tablas
spring.jpa.properties.hibernate.default_schema=usuarios

#'create-drop' por 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration=3600000
